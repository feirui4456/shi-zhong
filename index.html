<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        /* 移除 body 背景，实现外部透明 */
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background: transparent; 
        }
        
        .clock-container {
            width: 240px; height: 240px;
            position: relative;
            /* 内部保持白色，外部区域透明 */
            background: #f4f4f4;
            border-radius: 50%;
            border: 10px solid #d0d0d0;
            /* 保留内部阴影以维持立体感，去掉外部阴影以免影响透明背景 */
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        #bubbleCanvas { position: absolute; z-index: 1; top: 0; left: 0; }
        .ticks-container { position: absolute; width: 100%; height: 100%; z-index: 2; }
        .tick { position: absolute; width: 2px; height: 10px; background: #555; left: 119px; transform-origin: 1px 120px; }
        .tick.large { width: 3px; height: 16px; background: #000; }

        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; z-index: 4; border-radius: 4px; }
        .hour-hand { width: 7px; height: 45px; background: #222; margin-left: -3.5px; }
        .min-hand { width: 5px; height: 75px; background: #222; margin-left: -2.5px; }
        .sec-hand { width: 2px; height: 85px; background: #d32f2f; margin-left: -1px; }
        
        .center-dot { position: absolute; z-index: 5; width: 10px; height: 10px; background: #222; border-radius: 50%; top: 115px; left: 115px; }
        .date { position: absolute; top: 75%; width: 100%; text-align: center; font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; color: #444; z-index: 3; }
    </style>
</head>
<body>

<div class="clock-container" id="clock">
    <canvas id="bubbleCanvas" width="240" height="240"></canvas>
    <div class="ticks-container" id="ticks"></div>
    <div class="date" id="date"></div>
    <div class="center-dot"></div>
    <div class="hand hour-hand" id="hour"></div>
    <div class="hand min-hand" id="min"></div>
    <div class="hand sec-hand" id="sec"></div>
</div>

<script>
    const canvas = document.getElementById('bubbleCanvas');
    const ctx = canvas.getContext('2d');
    let bubbles = Array.from({length: 12}, () => ({
        x: 120, y: 120, vx: (Math.random()-0.5)*1.2, vy: (Math.random()-0.5)*1.2, r: Math.random()*5 + 2
    }));

    function draw() {
        ctx.clearRect(0, 0, 240, 240);
        ctx.fillStyle = 'rgba(180, 180, 180, 0.3)';
        bubbles.forEach(b => {
            b.x += b.vx; b.y += b.vy;
            if (Math.hypot(b.x-120, b.y-120) > 105 - b.r) { b.vx *= -1; b.vy *= -1; }
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();

    const tc = document.getElementById('ticks');
    for (let i = 0; i < 60; i++) {
        const t = document.createElement('div');
        t.className = i % 5 === 0 ? 'tick large' : 'tick';
        t.style.transform = `rotate(${i * 6}deg)`;
        tc.appendChild(t);
    }

    function update() {
        const now = new Date();
        document.getElementById('hour').style.transform = `rotate(${(now.getHours()%12)*30 + now.getMinutes()*0.5}deg)`;
        document.getElementById('min').style.transform = `rotate(${now.getMinutes()*6}deg)`;
        document.getElementById('sec').style.transform = `rotate(${now.getSeconds()*6}deg)`;
        
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        document.getElementById('date').innerText = `${y}/${m}/${d}`;
    }
    setInterval(update, 1000);
    update();
</script>
</body>
</html>
